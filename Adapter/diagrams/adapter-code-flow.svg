<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="693" viewBox="0 0 1060 693">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
  </marker>
</defs>
<style>
  .participant { fill: #ffffff; stroke: #334155; stroke-width: 1.4; }
  .actor { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.4; }
  .title { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
  .lifeline { stroke: #94a3b8; stroke-width: 1.2; stroke-dasharray: 6 5; }
  .message { stroke: #334155; stroke-width: 1.35; fill: none; }
  .message.dashed { stroke-dasharray: 6 5; }
  .label { font: 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
  .guard { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.1; }
  .guard-text { font: 12px "Segoe UI", Arial, sans-serif; fill: #78350f; }
</style>
<rect x="0" y="0" width="100%" height="100%" fill="#f8fafc"/>
<rect class="actor" x="16.0" y="24" width="128" height="46" rx="8"/>
<text class="title" text-anchor="middle" x="80.0" y="43.0"><tspan x="80.0" dy="0">User</tspan></text>
<line class="lifeline" x1="80.0" y1="70" x2="80.0" y2="659.0"/>
<rect class="participant" x="196.0" y="24" width="128" height="46" rx="8"/>
<text class="title" text-anchor="middle" x="260.0" y="43.0"><tspan x="260.0" dy="0">CheckoutService</tspan></text>
<line class="lifeline" x1="260.0" y1="70" x2="260.0" y2="659.0"/>
<rect class="participant" x="376.0" y="24" width="128" height="46" rx="8"/>
<text class="title" text-anchor="middle" x="440.0" y="43.0"><tspan x="440.0" dy="0">IPaymentGateway</tspan></text>
<line class="lifeline" x1="440.0" y1="70" x2="440.0" y2="659.0"/>
<rect class="participant" x="556.0" y="24" width="128" height="46" rx="8"/>
<text class="title" text-anchor="middle" x="620.0" y="43.0"><tspan x="620.0" dy="0">StripePaymentAdapter</tspan></text>
<line class="lifeline" x1="620.0" y1="70" x2="620.0" y2="659.0"/>
<rect class="participant" x="736.0" y="24" width="128" height="46" rx="8"/>
<text class="title" text-anchor="middle" x="800.0" y="43.0"><tspan x="800.0" dy="0">StripeService</tspan></text>
<line class="lifeline" x1="800.0" y1="70" x2="800.0" y2="659.0"/>
<rect class="participant" x="916.0" y="24" width="128" height="46" rx="8"/>
<text class="title" text-anchor="middle" x="980.0" y="43.0"><tspan x="980.0" dy="0">PaymentResult</tspan></text>
<line class="lifeline" x1="980.0" y1="70" x2="980.0" y2="659.0"/>
<line class="message" x1="80.0" y1="108.0" x2="260.0" y2="108.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="middle" x="170.0" y="100.0"><tspan x="170.0" dy="0">Checkout(19.99m)</tspan></text>
<line class="message" x1="260.0" y1="158.0" x2="440.0" y2="158.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="middle" x="350.0" y="150.0"><tspan x="350.0" dy="0">Pay(totalAmount, &quot;USD&quot;)</tspan></text>
<line class="message" x1="440.0" y1="208.0" x2="620.0" y2="208.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="middle" x="530.0" y="200.0"><tspan x="530.0" dy="0">Pay(amount, currency)</tspan></text>
<path class="message" d="M620.0,258.0 H674.0 V282.0 H626.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="start" x="692.0" y="250.0"><tspan x="692.0" dy="0">ConvertToCents(amount)</tspan></text>
<line class="message" x1="620.0" y1="308.0" x2="800.0" y2="308.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="middle" x="710.0" y="300.0"><tspan x="710.0" dy="0">Charge(amountInCents, currency)</tspan></text>
<line class="message dashed" x1="800.0" y1="358.0" x2="620.0" y2="358.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="middle" x="710.0" y="350.0"><tspan x="710.0" dy="0">StripeResponse</tspan></text>
<line class="message" x1="620.0" y1="408.0" x2="980.0" y2="408.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="middle" x="800.0" y="400.0"><tspan x="800.0" dy="0">new(success, transactionId,</tspan><tspan x="800.0" dy="14">message)</tspan></text>
<line class="message dashed" x1="980.0" y1="473.0" x2="620.0" y2="473.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="middle" x="800.0" y="465.0"><tspan x="800.0" dy="0">result</tspan></text>
<line class="message dashed" x1="620.0" y1="523.0" x2="260.0" y2="523.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="middle" x="440.0" y="515.0"><tspan x="440.0" dy="0">PaymentResult</tspan></text>
<line class="message dashed" x1="260.0" y1="573.0" x2="80.0" y2="573.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="middle" x="170.0" y="565.0"><tspan x="170.0" dy="0">print success or failure</tspan></text>
</svg>
