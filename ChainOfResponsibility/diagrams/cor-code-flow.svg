<text class="guard-text" text-anchor="start" x="42.0" y="572.0"><tspan x="42.0" dy="0">alt valid</tspan></text>
<line class="message" x1="800.0" y1="610.0" x2="980.0" y2="610.0" marker-end="url(#arrow)"/>
<text class="label" text-anchor="middle" x="890.0" y="602.0"><tspan x="890.0" dy="0">forward request</tspan></text>
